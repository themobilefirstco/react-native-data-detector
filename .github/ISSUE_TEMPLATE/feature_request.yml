name: Feature Request
description: Suggest an idea for react-native-data-detector
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: A clear description of the problem or limitation you're facing.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform Relevance
      options:
        - iOS
        - Android
        - Both
        - Platform-agnostic

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or workarounds you've considered.

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
